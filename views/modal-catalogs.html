<div class="modal-overlay" id="m-agency">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="m-agency-title">Alta de agencia</span>
      <button class="modal-close" onclick="closeModal('m-agency')">✕</button>
    </div>
    <div id="m-agency-alert"></div>
    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-control" id="a-name" placeholder="Transportes XYZ S.L." maxlength="100" />
    </div>
    <div class="form-group">
      <label class="form-label">Persona de contacto</label>
      <input type="text" class="form-control" id="a-contact" placeholder="Juan García" maxlength="100" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="a-email" placeholder="contacto@agencia.com" maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="a-phone" placeholder="600 123 456" maxlength="20" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observaciones</label>
      <textarea class="form-control" id="a-notes" placeholder="Notas adicionales..." maxlength="2000"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('m-agency')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAgency()">Guardar agencia</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="m-inctype">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title" id="m-inctype-title">Tipo de incidencia</span>
      <button class="modal-close" onclick="closeModal('m-inctype')">✕</button>
    </div>
    <div id="m-inctype-alert"></div>
    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-control" id="it-name" placeholder="Entrega fallida" maxlength="100" />
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-control" id="it-desc" placeholder="Descripción del tipo de incidencia..." maxlength="2000"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Color de etiqueta</label>
      <div class="color-picker-wrap">
        <input type="color" id="it-color" value="#1a56db" />
        <input type="text" class="form-control" id="it-color-hex" value="#1a56db" style="width:110px" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('m-inctype')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveIncType()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="m-comercial">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="m-comercial-title">Nuevo comercial</span>
      <button class="modal-close" onclick="closeModal('m-comercial')">✕</button>
    </div>
    <div id="m-comercial-alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre completo *</label>
        <input type="text" class="form-control" id="com-name" placeholder="Juan García López" maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="com-email" placeholder="juan@empresa.com" maxlength="100" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Zonas geográficas * <span style="font-size:11px;color:var(--text3);font-weight:400">(selecciona una o más)</span></label>
      <div id="com-zones-wrap"
        style="border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;max-height:180px;overflow-y:auto;background:var(--surface);display:flex;flex-wrap:wrap;gap:8px">
        <span style="color:var(--text3);font-size:13px">Cargando zonas...</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('m-comercial')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveComercial()">Guardar comercial</button>
    </div>
  </div>
</div>
