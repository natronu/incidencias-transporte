<div id="page-log" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Auditoría de Incidencias (Log)</span>
    </div>
    
    <div class="filters-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control" id="log-search" placeholder="Buscar por usuario o acción..." onkeyup="if(event.key==='Enter') filterLogs()">
      </div>
      <select class="form-control filter-select" id="log-filter-action" onchange="filterLogs()">
        <option value="">Todas las acciones</option>
        <option value="CREAR">Alta (Crear)</option>
        <option value="MODIFICAR">Modificar</option>
        <option value="ELIMINAR">Eliminar</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="loadLogs()" style="margin-left:auto">↻ Refrescar</button>
    </div>

    <div class="table-wrap">
      <table id="log-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Usuario</th>
            <th>Acción</th>
            <th>Incidencia Afectada</th>
            <th>Detalles</th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <div class="pagination-info" id="log-pag-info">Mostrando 0 registros</div>
      <div class="pagination-controls" id="log-pag-controls"></div>
    </div>
  </div>
</div>

<!-- Modal Detalles Log -->
<div class="modal-overlay" id="m-log-detail">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="m-log-title">Detalle del Registro</span>
      <button class="modal-close" onclick="closeModal('m-log-detail')">✕</button>
    </div>
    <div class="detail-grid" style="margin-bottom:1rem" id="m-log-metadata">
      <!-- Meta inyectada aquí -->
    </div>
    <div class="divider"></div>
    <div class="detail-label" style="margin-bottom:12px; color:var(--text)">Detalle de Cambios</div>
    <div id="m-log-changes" style="background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem;">
      <!-- Se inyecta la tabla de diferencias aquí -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('m-log-detail')">Cerrar</button>
    </div>
  </div>
</div>
